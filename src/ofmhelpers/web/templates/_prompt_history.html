<div class="prompt-history" id="prompt-history-block">
    <label style="font-weight:bold; display:block; margin-bottom:6px;">Recent prompts</label>
    <div class="prompt-chips"></div>
</div>

<style>
    .prompt-history { margin-bottom: 20px; }
    .prompt-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .prompt-chip {
        background: #eef2ff; border: 1px solid #c7d2fe; color: #333;
        padding: 6px 10px; border-radius: 16px; font-size: 13px;
        cursor: pointer; max-width: 320px; display: flex; align-items: center; gap: 6px;
    }
    .prompt-chip:hover { background: #e0e7ff; }
    .prompt-chip .chip-model {
        font-size: 11px; color: #6366f1; font-weight: bold; white-space: nowrap;
    }
    .prompt-chip .chip-text {
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .prompt-history-empty { color: #999; font-size: 13px; }
</style>

<script>
(function () {
    const container = document.getElementById('prompt-history-block');
    const chipsEl = container.querySelector('.prompt-chips');

    fetch('/prompt-history')
        .then((r) => {
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.json();
        })
        .then((items) => {
            console.log('prompt-history items:', items);
            if (!items.length) {
                chipsEl.innerHTML = '<span class="prompt-history-empty">No past prompts yet.</span>';
                return;
            }
            items.forEach((p) => {
                const chip = document.createElement('span');
                chip.className = 'prompt-chip';
                chip.title = p.prompt;

                const modelLabel = document.createElement('span');
                modelLabel.className = 'chip-model';
                modelLabel.textContent = p.model

                const label = document.createElement('span');
                label.className = 'chip-text';
                label.textContent = p.prompt.length > 40 ? p.prompt.slice(0, 40) + '…' : p.prompt;

                chip.append(modelLabel, label);
                chip.addEventListener('click', () => {
                    const textarea = document.querySelector('textarea[name="prompt"]');
                    if (textarea) {
                        textarea.value = p.prompt;
                        textarea.focus();
                    }
                });

                chipsEl.appendChild(chip);
            });
        })
        .catch((err) => {
            console.error('prompt-history fetch failed:', err);
            chipsEl.innerHTML = '<span class="prompt-history-empty">Could not load history</span>';
        });
})();
</script>
