<div style="max-width:360px; margin:80px auto;">
    <h1 style="margin-bottom:24px;">Sign in</h1>

    {% if error %}
    <p style="color:#b3261e; margin-bottom:16px;">{{ error }}</p>
    {% endif %}

    <form method="post" action="/login">
        <input type="hidden" name="next" value="{{ next }}">
        <div class="field" style="margin-bottom:16px;">
            <label style="display:block; margin-bottom:4px; font-weight:bold;">Password</label>
            <input type="password" name="password" required autofocus autocomplete="current-password"
                   style="padding:8px; width:100%; box-sizing:border-box;">
        </div>
        <button type="submit" style="padding:8px 20px; cursor:pointer;">Sign in</button>
    </form>
</div>
