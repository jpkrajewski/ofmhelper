{% extends "base.html" %}
{% block content %}
<h1>Clean image metadata</h1>
<p>Upload one or more images. EXIF/GPS/location metadata will be stripped.</p>

<form method="post" action="/clean-images/run" enctype="multipart/form-data">
    <input type="file" name="files" multiple accept="image/*" required>
    <br>
    <button type="submit">Clean images</button>
</form>
{% endblock %}
